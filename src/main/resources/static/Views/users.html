<!DOCTYPE html>
<html>
    <head>
        <title>Welcome</title>
        <link rel="stylesheet" href="styles.css"/>
        <link rel="stylesheet" href="users.css"/>
    </head>
    <body>
        <div class = "userinfo" id = "userinfo">
            <span id = "userdata">Welcome user</span>
            <a href = "../index.html" class="logout">Logout</a>
        </div>
        <div class = "menu" id = "menu">
            <button id = "home" onclick="window.location.href='homepage.html'">Home</button>
            <button id = "addasset" onclick="menuitemview(event)">Add Asset Info</button>
            <button id = "viewasset" onclick="assetsmenu(event)">Assets</button>
           

        </div>
        <div class = "menuitem" id = "menuitem">
            <button id ="uploadmultiple">Upload File</button>
            <button id = "singleentry">Add Assets</button>
            
        </div>
        <div class = "assetmenuitem" id = "assetmenuitem">
            <button id = "updateasset" onclick="window.location.href='manageassets.html'">View/Edit Assets</button>
        </div>
        <button id="newuser" onclick="window.location.href='adduser.html'">Add New</button>
        <div class = "userslist" id="userlist">
            <table class="usertable" id="usertable">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>User Name</th>
                        <th>User Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id = "tbody"></tbody>
            </table>
        </div>
        <script src="homepage.js"></script>
        <script src = "users.js"></script>
    </body>
</html>
